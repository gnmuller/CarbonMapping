# models/staging/eia/_eia__models.yml

version: 2

models:
  - name: stg_eia__energy_data_w_fuel_type
    description: Cleaned hourly EIA RTO generation by fuel type
    columns:
      - name: energy_data_id
        tests: [unique, not_null]
      - name: period_utc
        tests: [not_null]
      - name: respondent
        tests: [not_null]
      - name: fuel_type
        tests: [not_null]
      - name: generation_mw
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [period_utc, respondent, fuel_type]